# ==============================================================================
# postgresql.conf — Configuração personalizada para PostgreSQL 18
# Ajuste os valores conforme a capacidade do servidor.
# ==============================================================================
# Documentação: https://www.postgresql.org/docs/18/runtime-config.html

# ------------------------------------------------------------------------------
# Conexões e Autenticação
# ------------------------------------------------------------------------------
max_connections            = 100
superuser_reserved_connections = 3

# ------------------------------------------------------------------------------
# Memória (base: servidor com 2 GB de RAM)
# Regra geral: shared_buffers = 25% da RAM
# ------------------------------------------------------------------------------
shared_buffers             = 512MB
work_mem                   = 8MB
maintenance_work_mem       = 128MB
effective_cache_size       = 1GB

# ------------------------------------------------------------------------------
# WAL / Durabilidade
# ------------------------------------------------------------------------------
wal_level                  = replica
max_wal_size               = 1GB
min_wal_size               = 80MB
checkpoint_completion_target = 0.9

# ------------------------------------------------------------------------------
# Query Planner
# ------------------------------------------------------------------------------
random_page_cost           = 1.1      # SSD; use 4.0 para HDD
effective_io_concurrency   = 200      # SSD; use 2 para HDD
default_statistics_target  = 100

# ------------------------------------------------------------------------------
# Paralelismo
# ------------------------------------------------------------------------------
max_worker_processes       = 4
max_parallel_workers_per_gather = 2
max_parallel_workers       = 4
max_parallel_maintenance_workers = 2

# ------------------------------------------------------------------------------
# Logging
# ------------------------------------------------------------------------------
log_timezone               = 'America/Sao_Paulo'
log_min_duration_statement = 1000     # registra queries com mais de 1 segundo
log_checkpoints            = on
log_connections            = off
log_disconnections         = off
log_lock_waits             = on
log_line_prefix            = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# ------------------------------------------------------------------------------
# Localização
# ------------------------------------------------------------------------------
datestyle                  = 'iso, mdy'
timezone                   = 'America/Sao_Paulo'
lc_messages                = 'en_US.utf8'
lc_monetary                = 'pt_BR.UTF-8'
lc_numeric                 = 'pt_BR.UTF-8'
lc_time                    = 'pt_BR.UTF-8'
default_text_search_config = 'pg_catalog.portuguese'
