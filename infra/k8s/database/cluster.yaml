apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ansiventory-db
  namespace: ansiventory
spec:
  instances: 2

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"

  bootstrap:
    initdb:
      database: ansiventory
      owner: ansiventory
      secret:
        name: ansiventory-secrets

  storage:
    size: 5Gi
    storageClass: managed-csi  # ajuste conforme o storageClass do seu AKS

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  monitoring:
    enablePodMonitor: false
