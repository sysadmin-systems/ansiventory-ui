---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ansiventory-backend
  namespace: ansiventory

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ansiventory-backend
  namespace: ansiventory
  labels:
    app: ansiventory-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ansiventory-backend
  template:
    metadata:
      labels:
        app: ansiventory-backend
    spec:
      imagePullSecrets:
        - name: ansiventory-secrets
      serviceAccountName: ansiventory-backend
      containers:
        - name: ansiventory-backend
          image: bauhaussistemas/ansiventory-ui-backend:1.2
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: FRONTEND_URL
              value: "https://ansiventory.bauhaus.cloud"
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: ansiventory-secrets
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: ansiventory-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ansiventory-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ansiventory-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          command:
            - uvicorn
            - app.main:app
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --workers
            - "2"

---
apiVersion: v1
kind: Service
metadata:
  name: ansiventory-backend
  namespace: ansiventory
spec:
  selector:
    app: ansiventory-backend
  ports:
    - port: 80
      targetPort: 8000
