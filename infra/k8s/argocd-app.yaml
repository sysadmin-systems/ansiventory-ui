apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ansiventory
  namespace: argocd
spec:
  project: default

  source:
    repoURL: git@github.com:sysadmin-systems/ansiventory-ui.git
    targetRevision: master
    path: infra/k8s
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: ansiventory

  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /metadata/annotations/force-sync
        - /metadata/finalizers

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
