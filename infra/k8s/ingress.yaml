---
# Certificate via cert-manager + Cloudflare DNS challenge
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ansiventory-tls
  namespace: ansiventory
spec:
  secretName: ansiventory-tls-secret
  issuerRef:
    name: letsencrypt-prod        # ajuste para o nome do seu ClusterIssuer
    kind: ClusterIssuer
  dnsNames:
    - ansiventory.bauhaus.cloud  # ajuste para seu domínio

---
# IngressRoute — frontend (UI)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ansiventory-frontend
  namespace: ansiventory
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ansiventory.bauhaus.cloud`)
      kind: Rule
      services:
        - name: ansiventory-frontend
          port: 80
  tls:
    secretName: ansiventory-tls-secret

---
# IngressRoute — backend API (subpath /api e /auth)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ansiventory-backend
  namespace: ansiventory
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ansiventory.bauhaus.cloud`) && PathPrefix(`/api`)
      kind: Rule
      middlewares:
        - name: strip-api-prefix
      services:
        - name: ansiventory-backend
          port: 80
    - match: Host(`ansiventory.bauhaus.cloud`) && PathPrefix(`/auth`)
      kind: Rule
      services:
        - name: ansiventory-backend
          port: 80
    - match: Host(`ansiventory.bauhaus.cloud`) && PathPrefix(`/inventory`)
      kind: Rule
      services:
        - name: ansiventory-backend
          port: 80
    - match: Host(`ansiventory.bauhaus.cloud`) && PathPrefix(`/workspaces`)
      kind: Rule
      services:
        - name: ansiventory-backend
          port: 80
    - match: Host(`ansiventory.bauhaus.cloud`) && PathPrefix(`/vault`)
      kind: Rule
      services:
        - name: ansiventory-backend
          port: 80
  tls:
    secretName: ansiventory-tls-secret
    
---
# Middleware para remover o prefixo /api antes de passar pro backend
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: ansiventory
spec:
  stripPrefix:
    prefixes:
      - /api
